name: Build

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Test, lint, and build
        run: ./gradlew :xposed:testDebugUnitTest :xposed:lintDebug :xposed:assembleDebug :xposed:assembleRelease --stacktrace

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reports
          path: |
            xposed/build/reports/
            xposed/build/test-results/

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: apks
          path: xposed/build/outputs/apk/
