name: Build

on:
  push:
    tags:
      - "v*"
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Test, lint, and build
        run: ./gradlew :xposed:testDebugUnitTest :xposed:lintDebug :xposed:assembleDebug :xposed:assembleRelease --stacktrace

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reports
          path: |
            xposed/build/reports/
            xposed/build/test-results/

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: apks
          path: xposed/build/outputs/apk/

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode release keystore
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          test -n "$RELEASE_KEYSTORE_BASE64"
          printf '%s' "$RELEASE_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/release.keystore"

      - name: Build signed release APK
        env:
          RELEASE_STORE_FILE: ${{ runner.temp }}/release.keystore
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
          REQUIRE_RELEASE_SIGNING: "true"
        run: ./gradlew :xposed:assembleRelease --stacktrace

      - name: Verify signing certificate
        env:
          RELEASE_APK_CERT_SHA256: ${{ secrets.RELEASE_APK_CERT_SHA256 }}
        run: |
          test -n "$RELEASE_APK_CERT_SHA256"
          APK=xposed/build/outputs/apk/release/xposed-release.apk
          APKSIGNER=$(find "$ANDROID_HOME/build-tools" -name apksigner -type f | sort -V | tail -n 1)
          test -n "$APKSIGNER"
          "$APKSIGNER" verify --verbose --print-certs "$APK"
          ACTUAL_CERT=$("$APKSIGNER" verify --print-certs "$APK" | awk -F': ' '/Signer #1 certificate SHA-256 digest:/ {print $2}')
          test "$(printf '%s' "$ACTUAL_CERT" | tr -d ':' | tr '[:upper:]' '[:lower:]')" = "$(printf '%s' "$RELEASE_APK_CERT_SHA256" | tr -d ':' | tr '[:upper:]' '[:lower:]')"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: xposed/build/outputs/apk/release/xposed-release.apk
